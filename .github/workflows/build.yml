# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  PathToLibrarySolution: src/MauiFullScreen.slnx
  PathToSampleSolution: samples/MauiFullScreen.samples.slnx
  PathToMauiFullScreenTestsCsproj: src/MauiFullScreen.Tests/MauiFullScreen.Tests.csproj

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v6
    - name: Set up Xcode
      if: runner.os == 'macOS'
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '26.0'
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
    - name: Setup Java
      uses: actions/setup-java@v5
      with:
        distribution: 'microsoft'
        java-version: '21'
    - name: Install MAUI Workloads
      run: |
        dotnet workload install maui
        dotnet workload restore ${{ env.PathToLibrarySolution }}
    - name: Display dotnet info
      run: dotnet --info
    - name: Build Library & Sample
      run: dotnet build ${{ env.PathToLibrarySolution }} --configuration Release
    - name: Test
      run: dotnet test ${{ env.PathToMauiFullScreenTestsCsproj }} --configuration Release --no-build --verbosity normal
    - name: Pack Library Packages
      run: dotnet pack ${{ env.PathToLibrarySolution }} --configuration Release --no-build
    - name: Upload NuGet Packages
      uses: actions/upload-artifact@v7
      with:
        name: nuget-packages-${{ matrix.os }}
        path: '**/*.nupkg'
